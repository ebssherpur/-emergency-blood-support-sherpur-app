<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Chat List</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.header{
background:#d90429;
color:#fff;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.menu{
padding:15px;
text-align:center;
}

.menu button{
width:45%;
padding:12px;
margin:5px;
border:none;
border-radius:10px;
background:#d90429;
color:#fff;
font-size:18px;
cursor:pointer;
}

.user{
display:flex;
align-items:center;
background:#fff;
margin:10px;
padding:12px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.15);
cursor:pointer;
transition:.2s;
}

.user:hover{
transform:scale(1.02);
}

.user img{
width:55px;
height:55px;
border-radius:50%;
margin-right:15px;
}

.user h3{
margin:0;
font-size:18px;
}

.user p{
margin-top:4px;
color:#666;
font-size:15px;
}

</style>

</head>

<body>

<div class="header">
💬 Live Chat
</div>

<div class="menu">

<button onclick="loadDonors()">
🩸 Donors
</button>

<button onclick="loadVolunteers()">
👥 Volunteers
</button>

</div>

<div id="chatList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>
<script>

function openChat(phone){
location.href="chat.html?user="+phone;
}

function loadDonors(){

document.getElementById("chatList").innerHTML="Loading...";

db.ref("users").once("value").then(function(snapshot){

let html="";

snapshot.forEach(function(child){

let user=child.val();

html+=`

<div class="user" onclick="openChat('${user.phone}')">

<img src="https://i.imgur.com/6VBx3io.png">

<div>

<h3>${user.name}</h3>

<p>🩸 ${user.blood}</p>

</div>

</div>

`;

});

if(html==""){
html="<h3 style='text-align:center'>No Donor Found</h3>";
}

document.getElementById("chatList").innerHTML=html;

});

}

function loadVolunteers(){

document.getElementById("chatList").innerHTML="Loading...";

db.ref("volunteers").once("value").then(function(snapshot){

let html="";

snapshot.forEach(function(child){

let user=child.val();

if(user.status=="Approved"){

html+=`

<div class="user" onclick="openChat('${user.phone}')">

<img src="https://i.imgur.com/6VBx3io.png">

<div>

<h3>${user.name}</h3>

<p>👥 Volunteer</p>

</div>

</div>

`;

}

});

if(html==""){
html="<h3 style='text-align:center'>No Volunteer Found</h3>";
}

document.getElementById("chatList").innerHTML=html;

});

}

loadDonors();

</script>
</body>
</html>
