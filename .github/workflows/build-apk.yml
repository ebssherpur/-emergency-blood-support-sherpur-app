name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Web Wrapper
        run: |
          mkdir www
          cp *.html www/ 2>/dev/null || true
          cp *.css www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp *.png www/ 2>/dev/null || true
          cp *.jpg www/ 2>/dev/null || true
          
          npm init -y
          npm install @capacitor/core @capacitor/cli
          npx cap init "Free Blood Donation" "com.ebssherpur.bloodapp" --web-dir=www
          npm install @capacitor/android
          npx cap add android
          npx cap sync

      - name: Build Android Debug APK
        run: |
          cd android && ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Emergency-Blood-Support-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
