<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Volunteer Profile</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f3f5f9;
}

.card{
width:95%;
max-width:450px;
margin:20px auto;
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.18);
}

.header{
background:linear-gradient(135deg,#d90429,#ff4d6d);
padding:30px;
text-align:center;
color:#fff;
}

.photo-box{
position:relative;
display:inline-block;
}

.photo-box img{
width:130px;
height:130px;
border-radius:50%;
border:5px solid #fff;
object-fit:cover;
background:#fff;
}

.photo-btn{
position:absolute;
bottom:0;
right:0;
background:#fff;
color:#d90429;
border-radius:50%;
padding:8px;
font-size:18px;
cursor:pointer;
}

#photoInput{
display:none;
}

.name{
font-size:28px;
font-weight:bold;
margin-top:15px;
}

.rank{
display:inline-block;
margin-top:10px;
padding:8px 20px;
border-radius:25px;
font-weight:bold;
font-size:18px;
background:#cd7f32;
color:#fff;
}

.ref{
margin-top:12px;
font-size:18px;
font-weight:bold;
}

.info{
display:flex;
justify-content:space-between;
padding:16px 20px;
font-size:18px;
border-bottom:1px solid #eee;
}

.info b{
color:#d90429;
}

.progress-box{
padding:20px;
}

.progress{
width:100%;
height:18px;
background:#ddd;
border-radius:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#28a745;
transition:.5s;
}

.progress-text{
text-align:center;
margin-top:10px;
font-weight:bold;
font-size:17px;
}

button{
width:90%;
margin:15px auto;
display:block;
padding:14px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:10px;
background:#d90429;
color:#fff;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<div class="header">
  <div class="photo-box">

<img id="profilePic"
src="https://i.imgur.com/6VBx3io.png">

<label for="photoInput" class="photo-btn">📷</label>

<input type="file" id="photoInput">

</div>

<div class="name" id="vName"></div>

<div class="rank" id="badge"></div>

<div class="ref">
📌 <span id="vReference"></span>
</div>

</div>

<div class="info">
<b>📞 Phone</b>
<span id="vPhone"></span>
</div>

<div class="info">
<b>📧 Email</b>
<span id="vEmail"></span>
</div>

<div class="info">
<b>🩸 Blood Group</b>
<span id="vBlood"></span>
</div>

<div class="info">
<b>📍 District</b>
<span id="vDistrict"></span>
</div>

<div class="info">
<b>🏘️ Thana</b>
<span id="vThana"></span>
</div>

<div class="info">
<b>⭐ Points</b>
<span id="vPoints"></span>
</div>

<div class="info">
<b>🩸 Managed Blood</b>
<span id="vManaged"></span>
</div>

<div class="info">
<b>👥 Added Donor</b>
<span id="vDonor"></span>
</div>

<div class="info">
<b>🤝 Added Volunteer</b>
<span id="vVolunteer"></span>
</div>

<div class="progress-box">

<div class="progress">

<div id="progressBar"
class="progress-bar">
</div>

</div>

<div id="progressText"
class="progress-text">
0 / 100 Points
</div>

</div>

<button onclick="location.href='search-donor.html'">
🔍 Search Donor
</button>

<button onclick="location.href='blood-request-list.html'">
🩸 Blood Requests
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

<script>
  document.getElementById("vName").innerHTML=localStorage.getItem("name")||"";
document.getElementById("vPhone").innerHTML=localStorage.getItem("phone")||"";
document.getElementById("vEmail").innerHTML=localStorage.getItem("email")||"";
document.getElementById("vBlood").innerHTML=localStorage.getItem("blood")||"";
document.getElementById("vDistrict").innerHTML=localStorage.getItem("district")||"";
document.getElementById("vThana").innerHTML=localStorage.getItem("thana")||"";
document.getElementById("vReference").innerHTML=localStorage.getItem("reference")||"";
document.getElementById("vPoints").innerHTML=localStorage.getItem("points")||0;
document.getElementById("vManaged").innerHTML=localStorage.getItem("managedBlood")||0;
document.getElementById("vDonor").innerHTML=localStorage.getItem("addedDonor")||0;
document.getElementById("vVolunteer").innerHTML=localStorage.getItem("addedVolunteer")||0;

let points=parseInt(localStorage.getItem("points")||0);

let badge=document.getElementById("badge");

let nextRank=100;

if(points>=500){

badge.innerHTML="💎 Platinum Volunteer";
badge.style.background="#00b4d8";
nextRank=500;

}else if(points>=200){

badge.innerHTML="🥇 Gold Volunteer";
badge.style.background="gold";
badge.style.color="#000";
nextRank=500;

}else if(points>=100){

badge.innerHTML="🥈 Silver Volunteer";
badge.style.background="silver";
badge.style.color="#000";
nextRank=200;

}else{

badge.innerHTML="🥉 Bronze Volunteer";
badge.style.background="#cd7f32";

}

let percent=Math.min((points/nextRank)*100,100);

document.getElementById("progressBar").style.width=percent+"%";

document.getElementById("progressText").innerHTML=
points+" / "+nextRank+" Points";

document.getElementById("photoInput").onchange=function(e){

const reader=new FileReader();

reader.onload=function(){

document.getElementById("profilePic").src=reader.result;

localStorage.setItem("profilePhoto",reader.result);

}

reader.readAsDataURL(e.target.files[0]);

}

if(localStorage.getItem("profilePhoto")){

document.getElementById("profilePic").src=
localStorage.getItem("profilePhoto");

}

function logout(){

localStorage.clear();

window.location.href="login.html";

}

</script>

</body>
</html>
