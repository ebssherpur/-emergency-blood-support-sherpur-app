<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blood Request</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

.container{
width:90%;
max-width:450px;
margin:20px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#d90429;
}

input,select,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#d90429;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#b00020;
}
</style>

</head>
<body>

<div class="container">

<h2>🩸 Blood Request Form</h2>

<input type="text" id="patientName" placeholder="Patient Name">

<select id="bloodGroup">
<option value="">Select Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<input type="text" id="hospital" placeholder="Hospital Name">

<input type="text" id="district" placeholder="District">

<input type="text" id="phone" placeholder="Phone Number">

<input type="number" id="bags" placeholder="How Many Bags">

<input type="text" id="hemoglobin" placeholder="Hemoglobin">

<input type="datetime-local" id="time">

<textarea id="details" placeholder="Patient Problem / Details"></textarea>

<button onclick="submitRequest()">Submit Blood Request</button>

</div>

<script>

function submitRequest(){

let id=Date.now();

db.ref("bloodRequests/"+id).set({

patientName:document.getElementById("patientName").value,
bloodGroup:document.getElementById("bloodGroup").value,
hospital:document.getElementById("hospital").value,
district:document.getElementById("district").value,
phone:document.getElementById("phone").value,
bags:document.getElementById("bags").value,
hemoglobin:document.getElementById("hemoglobin").value,
time:document.getElementById("time").value,
details:document.getElementById("details").value,

status:"Pending",
date:new Date().toLocaleString()

}).then(()=>{

alert("Blood Request Submitted Successfully!");

window.location="index.html";

});

}

</script>

</body>
</html>
