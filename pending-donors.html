<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pending Donors</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

.header{
background:#d90429;
color:#fff;
padding:15px;
text-align:center;
}

.card{
background:#fff;
margin:10px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
color:#fff;
cursor:pointer;
}

.approve{
background:green;
}

.reject{
background:red;
}
</style>

</head>
<body>

<div class="header">
<h2>Pending Donors</h2>
</div>

<div id="list"></div>

<script>

db.ref("donors").on("value",function(snapshot){

let html="";

snapshot.forEach(function(data){

let donor=data.val();
let id=data.key;

if(donor.status=="Pending"){

html+=`
<div class="card">

<h3>${donor.name}</h3>

<p><b>Blood:</b> ${donor.blood}</p>

<p><b>Phone:</b> ${donor.phone}</p>

<p><b>District:</b> ${donor.district}</p>

<button class="approve" onclick="approve('${id}')">
Approve
</button>

<button class="reject" onclick="rejectDonor('${id}')">
Reject
</button>

</div>
`;

}

});

document.getElementById("list").innerHTML=html;

});

function approve(id){

db.ref("donors/"+id+"/status").set("Approved");

alert("Donor Approved");

}

function rejectDonor(id){

db.ref("donors/"+id+"/status").set("Rejected");

alert("Donor Rejected");

}

</script>

</body>
</html>
