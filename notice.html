<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notice Board</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#d90429;
color:#fff;
padding:15px;
text-align:center;
}

.container{
width:95%;
max-width:700px;
margin:20px auto;
}

textarea{
width:100%;
height:100px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#d90429;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
}

.card{
background:#fff;
padding:15px;
margin-top:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.delete{
background:red;
margin-top:10px;
}
</style>

</head>
<body>

<header>
<h2>📢 Notice Board</h2>
</header>

<div class="container">

<textarea id="noticeText" placeholder="Write Notice Here..."></textarea>

<button onclick="addNotice()">Publish Notice</button>

<div id="noticeList"></div>

</div>

<script>

function addNotice(){

let text=document.getElementById("noticeText").value;

if(text==""){
alert("Write a notice first");
return;
}

let id=Date.now();

db.ref("notice/"+id).set({

text:text,
date:new Date().toLocaleString()

});

document.getElementById("noticeText").value="";

}

db.ref("notice").on("value",function(snapshot){

let html="";

snapshot.forEach(function(item){

let n=item.val();
let id=item.key;

html+=`

<div class="card">

<h4>${n.date}</h4>

<p>${n.text}</p>

<button class="delete" onclick="deleteNotice('${id}')">

Delete

</button>

</div>

`;

});

document.getElementById("noticeList").innerHTML=html;

});

function deleteNotice(id){

db.ref("notice/"+id).remove();

alert("Notice Deleted");

}

</script>

</body>
</html>
