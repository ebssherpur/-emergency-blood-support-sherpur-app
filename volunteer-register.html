<!DOCTYPE html>
<html lang="bn">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Become Volunteer</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
}

.container{
width:90%;
max-width:450px;
margin:20px auto;
background:#fff;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

h2{
text-align:center;
color:#d90429;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#d90429;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#b00020;
}

</style>

</head>

<body>

<div class="container">

<h2>Become Volunteer</h2>

<input type="text" id="name" placeholder="Full Name">

<input type="text" id="phone" placeholder="Phone Number">

<input type="email" id="email" placeholder="Email Address">

<input type="text" id="facebook" placeholder="Facebook Profile Link">

<select id="blood">
<option value="">Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>

<input type="text" id="district" placeholder="District">

<input type="text" id="thana" placeholder="Thana">
<input type="text" id="usedReference" placeholder="Referral Code (Optional)">
<input type="password" id="password" placeholder="Password">

<button onclick="registerVolunteer()">
Register Volunteer
</button>

</div>

<script>

const db = firebase.database();

function registerVolunteer(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let email = document.getElementById("email").value;
let facebook = document.getElementById("facebook").value;
let blood = document.getElementById("blood").value;
let district = document.getElementById("district").value;
let thana = document.getElementById("thana").value;
let password = document.getElementById("password").value;
let usedReference = document.getElementById("usedReference").value.trim();
if(name==""||phone==""||email==""||blood==""||district==""||thana==""||password==""){

alert("সব তথ্য পূরণ করুন");
return;

}

let id = Date.now();

let reference = "VOL" + Math.floor(100000 + Math.random()*900000);

db.ref("volunteers/"+id).set({

name:name,
phone:phone,
email:email,
facebook:facebook,
blood:blood,
district:district,
thana:thana,

reference:reference,
usedReference: usedReference,
password:password,

points:0,
managedBlood:0,
addedDonor:0,
addedVolunteer:0,

role:"volunteer",
status:"Pending"

}).then(function(){

if(usedReference!=""){

db.ref("volunteers").once("value").then(function(snapshot){

snapshot.forEach(function(item){

let v = item.val();

if(v.reference == usedReference){

db.ref("volunteers/"+item.key+"/points").set((v.points || 0)+10);

}

});

});

}

alert(
"Volunteer Registration Successful!\n\n"+
"Waiting For Admin Approval.\n\n"+
"Your Reference Code:\n"+reference
);

window.location.href="login.html";

});

}

</script>

</body>
</html>
