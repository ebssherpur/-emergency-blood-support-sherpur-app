<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign Up | Emergency Blood Support Sherpur</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-red-50 flex items-center justify-center min-h-screen p-5">

<div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8">

<div class="text-center mb-6">

<h1 class="text-3xl font-bold text-red-600">
🩸 Create New Account
</h1>

<p class="text-gray-500 mt-2">
Emergency Blood Support Sherpur
</p>

</div>

<input
id="name"
type="text"
placeholder="👤 Full Name"
class="w-full border border-gray-300 rounded-xl p-4 mb-4">

<input
id="phone"
type="tel"
placeholder="📱 Phone Number"
class="w-full border border-gray-300 rounded-xl p-4 mb-4">

<select
id="blood"
class="w-full border border-gray-300 rounded-xl p-4 mb-4">

<option value="">Select Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>

<input
id="district"
type="text"
placeholder="📍 District"
class="w-full border border-gray-300 rounded-xl p-4 mb-4">

<input
id="password"
type="password"
placeholder="🔒 Password"
class="w-full border border-gray-300 rounded-xl p-6 mb-6">

<button
id="signupBtn"
class="w-full bg-red-600 text-white rounded-xl p-4 text-lg font-bold hover:bg-red-700">
Create Account
</button>

<div class="text-center mt-5">

<a href="login.html"
class="text-red-600 font-semibold">
Already have an account? Login
</a>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
