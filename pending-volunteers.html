<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pending Volunteers</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="firebase.js"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#d90429;
color:#fff;
padding:15px;
text-align:center;
}

.card{
background:#fff;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

button{
padding:10px 18px;
margin:5px;
border:none;
border-radius:8px;
color:#fff;
cursor:pointer;
font-size:15px;
}

.approve{
background:green;
}

.reject{
background:red;
}
</style>

</head>

<body>

<header>
<h2>Pending Volunteers</h2>
</header>

<div id="volunteerList"></div>

<script>

db.ref("volunteers").on("value",function(snapshot){

let html="";

snapshot.forEach(function(item){

let volunteer=item.val();
let id=item.key;

if(volunteer.status=="Pending"){

html+=`
<div class="card">

<h3>${volunteer.name}</h3>

<p><b>Blood Group:</b> ${volunteer.blood}</p>

<p><b>Phone:</b> ${volunteer.phone}</p>

<p><b>District:</b> ${volunteer.district}</p>

<p><b>Status:</b> ${volunteer.status}</p>

<button class="approve" onclick="approveVolunteer('${id}')">
✅ Approve
</button>

<button class="reject" onclick="rejectVolunteer('${id}')">
❌ Reject
</button>

</div>
`;

}

});

document.getElementById("volunteerList").innerHTML=html;

});

function approveVolunteer(id){

db.ref("volunteers/"+id+"/status").set("Approved");

alert("Volunteer Approved");

}

function rejectVolunteer(id){

db.ref("volunteers/"+id+"/status").set("Rejected");

alert("Volunteer Rejected");

}

</script>

</body>
</html>
